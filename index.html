<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JLang IDE (Upgraded)</title>

<style>
:root{
  --bg-main:#1e1e1e;
  --bg-sidebar:#252526;
  --bg-topbar:#323233;
  --border:#3c3c3c;
  --text-main:#cccccc;
  --text-editor:#9cdcfe;
  --text-terminal:#4ec9b0;
  --accent:#0e639c;
  --accent-hover:#1177bb;
  --stop:#e81123;
}

body{
  margin:0;
  background:var(--bg-main);
  color:var(--text-main);
  font-family:Segoe UI, Tahoma, sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#top-bar{
  display:flex;
  gap:8px;
  padding:8px;
  background:var(--bg-topbar);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}

button{
  background:var(--accent);
  border:none;
  color:#fff;
  padding:6px 10px;
  border-radius:4px;
  cursor:pointer;
}
button:hover{background:var(--accent-hover)}

#stop-btn{background:var(--stop);display:none}

#layout{display:flex;flex:1;overflow:hidden}

.panel-title{
  font-size:11px;
  padding:8px;
  background:var(--bg-sidebar);
  border-bottom:1px solid var(--border);
  text-transform:uppercase;
}

#sidebar{
  width:260px;
  background:var(--bg-sidebar);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

#sidebar.hidden{display:none}

#aiBox{padding:10px;display:flex;flex-direction:column;gap:8px}
#aiInput{padding:6px;background:#111;border:1px solid var(--border);color:#fff}
#aiOutput{font-size:12px;overflow:auto;flex:1;color:#dcdcaa}

#center{flex:1;display:flex;flex-direction:column}

#editor{
  flex:1;
  padding:12px;
  outline:none;
  font-family:Consolas, monospace;
  color:var(--text-editor);
  white-space:pre-wrap;
  overflow:auto;
}

#terminal{
  height:35%;
  border-top:1px solid var(--border);
  padding:10px;
  overflow:auto;
  font-family:Consolas;
  color:var(--text-terminal);
}

#right{
  width:320px;
  border-left:1px solid var(--border);
  background:var(--bg-sidebar);
  display:flex;
  flex-direction:column;
}

canvas{background:#000;margin:10px}

.modal{
  position:absolute;
  display:none;
  background:var(--bg-sidebar);
  border:1px solid var(--border);
  width:420px;
  max-height:80vh;
  flex-direction:column;
}

.modal-header{
  background:var(--bg-topbar);
  padding:8px;
  cursor:move;
  display:flex;
  justify-content:space-between;
}

.modal-body{padding:10px;overflow:auto}

code{color:#9cdcfe}

</style>
</head>
<body>

<div id="top-bar">
  <button onclick="run()">▶ Run</button>
  <button id="stop-btn" onclick="stop()">⏹ Stop</button>
  <button onclick="clearAll()">🧹 Clear</button>
  <button onclick="save()">💾 Save</button>
  <button onclick="openFile()">📂 Open</button>
  <button onclick="toggleAI()">🤖 AI</button>
  <button onclick="toggleHelp()">❓</button>
</div>

<div id="layout">

<div id="sidebar" class="hidden">
  <div class="panel-title">AI</div>
  <div id="aiBox">
    <input id="aiInput" placeholder="ask..." />
    <button onclick="askAI()">Send</button>
    <div id="aiOutput"></div>
  </div>
</div>

<div id="center">
  <div class="panel-title">main.jlang</div>
  <div id="editor" contenteditable="true">say "hello"
wait 1000
say "done"</div>

  <div class="panel-title">Terminal</div>
  <div id="terminal"></div>
</div>

<div id="right">
  <div class="panel-title">Game</div>
  <canvas id="game" width="300" height="200"></canvas>
</div>

</div>

<!-- HELP -->
<div id="help" class="modal">
  <div class="modal-header">
    <span>Commands</span>
    <button onclick="toggleHelp()">X</button>
  </div>
  <div class="modal-body">
    <input id="searchDocs" placeholder="search commands..." oninput="filterDocs()" style="width:100%;padding:5px" />
    <ul id="docs"></ul>
  </div>
</div>

<input type="file" id="file" hidden />

<script src="syntax.js"></script>
<script src="AiAssistant.js"></script>

<script>
let running = false;

window.onload = () => {
  loadDocs();
};

function loadDocs(){
  const list = document.getElementById("docs");
  list.innerHTML = "";

  if(!window.JLang?.commandDictionary){
    list.innerHTML = "Missing syntax.js";
    return;
  }

  window.JLang.commandDictionary.forEach(c=>{
    const li=document.createElement("li");
    li.innerHTML = `<code>${c.syntax}</code> - ${c.desc}`;
    list.appendChild(li);
  });
}

function filterDocs(){
  const q=document.getElementById("searchDocs").value.toLowerCase();
  document.querySelectorAll("#docs li").forEach(li=>{
    li.style.display = li.innerText.toLowerCase().includes(q)?"":"none";
  });
}

async function run(){
  if(!window.JLang) return alert("missing syntax.js");

  running=true;
  document.getElementById("stop-btn").style.display="inline-block";

  const code=document.getElementById("editor").innerText.split("\n");
  const out=document.getElementById("terminal");

  await window.JLang.run(code,out);

  running=false;
  document.getElementById("stop-btn").style.display="none";
}

function stop(){
  window.JLang?.stopExecution?.();
  running=false;
}

function clearAll(){
  document.getElementById("editor").innerText="";
  document.getElementById("terminal").innerHTML="";
}

function save(){
  const blob=new Blob([editor.innerText]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="code.jlang";
  a.click();
}

function openFile(){
  document.getElementById("file").click();
  file.onchange=()=>{
    const r=new FileReader();
    r.onload=()=>editor.innerText=r.result;
    r.readAsText(file.files[0]);
  }
}

function toggleAI(){sidebar.classList.toggle("hidden");}

function askAI(){
  const i=aiInput.value;
  aiOutput.innerText = window.AiAssistant?.ask(i) || "AI missing";
}

function toggleHelp(){
  help.style.display = help.style.display==="flex"?"none":"flex";
}

// KEY PRESS HELP (? key)
document.addEventListener("keydown",e=>{
  if(e.key==="?") toggleHelp();
});

// simple draggable
function drag(el){
  let offX,offY,down=false;
  el.querySelector(".modal-header").onmousedown=e=>{
    down=true;
    offX=e.clientX-el.offsetLeft;
    offY=e.clientY-el.offsetTop;
  };
  document.onmousemove=e=>{
    if(!down)return;
    el.style.left=(e.clientX-offX)+"px";
    el.style.top=(e.clientY-offY)+"px";
  };
  document.onmouseup=()=>down=false;
}
drag(help);

// mini game
const ctx=document.getElementById("game").getContext("2d");
let x=10;
setInterval(()=>{
  ctx.clearRect(0,0,300,200);
  ctx.fillStyle="#4ec9b0";
  ctx.fillRect(x,80,40,40);
  x+=2;if(x>300)x=-40;
},30);

</script>

</body>
</html>
